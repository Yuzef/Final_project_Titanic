general:
  experiment_name: knn_v2_stratified_group_kfold
  seed: 1027309
  num_classes: 2
paths:
  train_csv: data_raw/train.csv
  test_csv: data_raw/test.csv
  trained_models: trained_models
validation:
  enabled: true
  strategy: stratified_group_kfold
  n_splits: 5
  shuffle: true
  target_column: Survived
  group_by: family
  family:
    surname_column: Name
    sibsp_column: SibSp
    parch_column: Parch
    passenger_id_column: PassengerId
    solo_as_unique_group: true
preprocessing:
  embarked:
    enabled: true
    strategy: most_frequent
  age:
    enabled: true
    strategy: mean_by_title
  initial:
    enabled: true
    output_column: Initial
  age_binning:
    enabled: true
    strategy: equal_width
    output_column: Age_band
    num_bins: 5
    drop_original: true
  categorical_encoding:
    enabled: true
    mapping:
      enabled: true
      columns:
        Sex:
          male: 0
          female: 1
    one_hot:
      enabled: true
      columns:
      - Embarked
      - Initial
      drop_first: true
  family_features:
    enabled: true
    family_size_column: Family_Size
    alone_column: Alone
    drop_original: true
  fare:
    enabled: true
    strategy: median
  fare_binning:
    enabled: true
    strategy: quantile
    output_column: Fare_Range
    num_bins: 4
    drop_original: true
  features:
    given_columns:
    - PassengerId
    - Survived
    - Pclass
    - Name
    - Sex
    - Age
    - SibSp
    - Parch
    - Ticket
    - Fare
    - Cabin
    - Embarked
    use_columns:
    - Pclass
    - Sex
    - Age_band
    - Fare_Range
    - Family_Size
    - Alone
    include_prefixes:
    - Embarked_
    - Initial_
  save_processed: false
modeling:
  enabled: true
  scale_features: true
  models:
  - name: logistic_regression_no_regularization
    enabled: false
    type: logistic_regression
    params:
      penalty: null
      solver: lbfgs
      max_iter: 5000
  - name: logreg_l1
    enabled: false
    type: logistic_regression
    params:
      penalty: l1
      C: 0.1
      solver: liblinear
      max_iter: 5000
  - name: logreg_l2
    enabled: false
    type: logistic_regression
    params:
      penalty: l2
      C: 10.0
      solver: lbfgs
      max_iter: 5000
  - name: logreg_elasticnet
    enabled: false
    type: logistic_regression
    params:
      penalty: elasticnet
      C: 10.0
      solver: saga
      l1_ratio: 0.5
      max_iter: 5000
  - name: knn_k3_uniform_euclidean
    enabled: true
    type: knn
    params:
      n_neighbors: 3
      weights: uniform
      metric: euclidean
  - name: knn_k3_distance_euclidean
    enabled: true
    type: knn
    params:
      n_neighbors: 3
      weights: distance
      metric: euclidean
  - name: knn_k5_uniform_euclidean
    enabled: true
    type: knn
    params:
      n_neighbors: 5
      weights: uniform
      metric: euclidean
  - name: knn_k5_distance_euclidean
    enabled: true
    type: knn
    params:
      n_neighbors: 5
      weights: distance
      metric: euclidean
  - name: knn_k5_distance_manhattan
    enabled: true
    type: knn
    params:
      n_neighbors: 5
      weights: distance
      metric: manhattan
  - name: knn_k7_distance_euclidean
    enabled: true
    type: knn
    params:
      n_neighbors: 7
      weights: distance
      metric: euclidean
  - name: knn_k7_distance_manhattan
    enabled: true
    type: knn
    params:
      n_neighbors: 7
      weights: distance
      metric: manhattan
  - name: knn_k7_uniform_manhattan
    enabled: true
    type: knn
    params:
      n_neighbors: 7
      weights: uniform
      metric: manhattan
  - name: knn_k7_uniform_euclidean
    enabled: true
    type: knn
    params:
      n_neighbors: 7
      weights: uniform
      metric: euclidean
  - name: knn_k11_uniform_euclidean
    enabled: true
    type: knn
    params:
      n_neighbors: 11
      weights: uniform
      metric: euclidean
  - name: knn_k11_distance_euclidean
    enabled: true
    type: knn
    params:
      n_neighbors: 11
      weights: distance
      metric: euclidean
  - name: knn_k11_uniform_manhattan
    enabled: true
    type: knn
    params:
      n_neighbors: 11
      weights: uniform
      metric: manhattan
  - name: knn_k13_distance_euclidean
    enabled: true
    type: knn
    params:
      n_neighbors: 13
      weights: distance
      metric: euclidean
  - name: knn_k13_uniform_euclidean
    enabled: true
    type: knn
    params:
      n_neighbors: 13
      weights: uniform
      metric: euclidean
  - name: knn_k13_uniform_manhattan
    enabled: true
    type: knn
    params:
      n_neighbors: 13
      weights: uniform
      metric: manhattan
metric:
  name: accuracy
inference:
  enabled: true
  model_name: logreg_l2
  use_best_model: true
  id_column: PassengerId
  prediction_column: Survived
  submission_dir: submissions
logging:
  enabled: true
  save_config: true
  save_fold_results: true
  save_summary: true
  save_artifact_paths: true
  save_best_model: true
  save_readable_report: true
