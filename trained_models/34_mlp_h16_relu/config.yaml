general:
  experiment_name: 34_mlp_h16_relu
  seed: 1027309
  num_classes: 2
paths:
  train_csv: data_raw/train.csv
  test_csv: data_raw/test.csv
  trained_models: trained_models
validation:
  enabled: true
  strategy: stratified_group_kfold
  n_splits: 5
  shuffle: true
  target_column: Survived
  group_by: family
  family:
    surname_column: Name
    sibsp_column: SibSp
    parch_column: Parch
    passenger_id_column: PassengerId
    solo_as_unique_group: true
preprocessing:
  embarked:
    enabled: true
    strategy: most_frequent
  age:
    enabled: true
    strategy: mean_by_title
  initial:
    enabled: true
    output_column: Initial
  age_binning:
    enabled: true
    strategy: equal_width
    output_column: Age_band
    num_bins: 5
    drop_original: true
  categorical_encoding:
    enabled: true
    mapping:
      enabled: true
      columns:
        Sex:
          male: 0
          female: 1
    one_hot:
      enabled: true
      columns:
      - Embarked
      - Initial
      drop_first: true
  family_features:
    enabled: true
    family_size_column: Family_Size
    alone_column: Alone
    drop_original: true
  fare:
    enabled: true
    strategy: median
  fare_binning:
    enabled: true
    strategy: quantile
    output_column: Fare_Range
    num_bins: 4
    drop_original: true
  features:
    given_columns:
    - PassengerId
    - Survived
    - Pclass
    - Name
    - Sex
    - Age
    - SibSp
    - Parch
    - Ticket
    - Fare
    - Cabin
    - Embarked
    use_columns:
    - Pclass
    - Sex
    - Age_band
    - Fare_Range
    - Family_Size
    - Alone
    include_prefixes:
    - Embarked_
    - Initial_
modeling:
  enabled: true
  scale_features: true
  n_jobs: 6
  models:
  - name: dnn_mlp_h16_relu
    enabled: true
    type: pytorch
    params:
      architecture: mlp
      hidden_dim: 16
      activation: relu
      output_dim: ${general.num_classes}
dl:
  enabled: true
  training:
    num_epochs: 10
    device: auto
    mixed_precision: false
    verbose: false
    lr: 0.0001
  dataloader_params:
    batch_size: 32
    num_workers: 0
    pin_memory: false
    persistent_workers: false
    shuffle: true
    drop_last: false
  optimizer:
    name: adam
    params:
      lr: ${dl.training.lr}
      weight_decay: 0.0001
  loss:
    name: cross_entropy
    params: {}
metric:
  name: accuracy
inference:
  enabled: true
  model_name: logreg_l2
  use_best_model: true
  id_column: PassengerId
  prediction_column: Survived
  submission_dir: submissions
logging:
  enabled: true
  save_config: true
  save_fold_results: true
  save_summary: true
  save_artifact_paths: true
  save_best_model: true
  save_readable_report: true
